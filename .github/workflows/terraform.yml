<div> <div style="margin-bottom: 20px;"> <h3 style="margin-top: 0;">📍 网页端精准查找路径指南 (us-phoenix-1)</h3> <ol> <li>登录 OCI 控制台并切换区域至 <b>us-phoenix-1</b>。</li> <li>在侧边栏导航：<strong>计算 (Compute)</strong> &gt; <strong>映像 (Images)</strong>。</li> <li>选择 <strong>平台映像 (Platform Images)</strong> 选项卡。</li> <li>在列表中搜索 <strong>Ubuntu 22.04</strong>。</li> <li>点击映像名称，复制右侧的 <strong>OCID</strong> 字符串。</li> </ol> </div> <div style="margin-bottom: 20px;"> <h3>💻 CLI 自动化一键查询脚本</h3> <div style="background: var(--surface-container-highest); padding: 12px; border-radius: 4px; font-family: monospace; border-left: 4px solid var(--primary); word-break: break-all;"> oci compute image list <br/> --region us-phoenix-1 <br/> --operating-system "Ubuntu 22.04" <br/> --all <br/> --query "data[0].id" </div> <p style="font-size: 0.85em; color: var(--on-surface-variant); margin-top: 8px;"> * 请确保已配置 OCI CLI 环境或在 GitHub Action 运行环境中执行。 </p> </div> </div>
