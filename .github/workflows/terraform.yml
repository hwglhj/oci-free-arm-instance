name: 侦察任务：获取凤凰城真实 ID

on:
  # 只允许手动点击触发，不设置定时
  workflow_dispatch:

jobs:
  get-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 侦察任务：获取凤凰城真实 ID
        run: |
          # 1. 配置 OCI 证书
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          # 强制将区域设置为凤凰城
          echo "region=us-phoenix-1" >> ~/.oci/config 

          # 2. 查询凤凰城的 Ubuntu 22.04 ARM 镜像
          echo "=================================================="
          echo "正在查询凤凰城 (us-phoenix-1) 的可用镜像列表..."
          oci compute image list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --all \
            --query "data[*].{Name:\"display-name\", ID:id}" \
            --output table

          # 3. 查询你账号在凤凰城的专属 AD Name
          echo "=================================================="
          echo "正在查询凤凰城 (us-phoenix-1) 的 AD Name..."
          oci iam availability-domain list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --query "data[*].{Name:name}" \
            --output table
