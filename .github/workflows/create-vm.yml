name: Try to Create OCI VM

on:
  schedule:
    # 每 5 分钟运行一次
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 移除可能带来 CLI 版本滞后的 cache，直接每次全新安装（大约只需十几秒）
      - name: Install OCI CLI
        run: |
          pip install oci-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        continue-on-error: true 
        run: |
          # 1. 配置 OCI 证书
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config
          
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          # 2. 严格的前置变量空值检查，防止空变量导致 400 错误
          if [ -z "$COMPARTMENT_ID" ] || [ -z "$AD_NAME" ] || [ -z "$SUBNET_ID" ] || [ -z "$IMAGE_ID" ]; then
            echo "错误: 检测到核心 OCI 配置变量（COMPARTMENT_ID, AD_NAME, SUBNET_ID, IMAGE_ID）存在空值！"
            echo "请检查 GitHub Secrets 是否正确配置。"
            exit 1
          fi

          # 3. 运行创建命令 (优化了 --shape-config 的转义，并临时注释引导卷大小做测试)
          echo "正在尝试申请甲骨文 ARM 实例..."
          oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config "{\"ocpus\":4,\"memoryInGBs\":24}" \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "test" > oci_output.log 2>&1 || true
            # 如果确认变量没错后依然 400，可以尝试把下面这行加回去
            # --boot-volume-size-in-gbs 200 

          # 打印日志到控制台
          cat oci_output.log

          # 4. 多行安全写入 GITHUB_OUTPUT
          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          cat oci_output.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 5. 判断是否成功
          if grep -q '"lifecycle-state": "PROVISIONING"' oci_output.log; then
            echo "Success! 'PROVISIONING' 状态已找到。"
            exit 0
          else
            echo "Error: 未成功创建实例。"
            exit 1
          fi
